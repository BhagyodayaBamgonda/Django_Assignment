{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2 class="text-center">Leave Management</h2>

    <input type="hidden" id="leave_id">

    <div class="row">

        <div class="col-md-4">
            <label>Employee</label>
            <select id="employee" class="form-control"></select>
        </div>

        <div class="col-md-4">
            <label>Leave Type</label>
            <select id="leave_type" class="form-control">
                <option value="Casual">Casual</option>
                <option value="Sick">Sick</option>
                <option value="Earned">Earned</option>
            </select>
        </div>

        <div class="col-md-4">
            <label>Status</label>
            <select id="status" class="form-control">
                <option value="Pending">Pending</option>
                <option value="Approved">Approved</option>
                <option value="Rejected">Rejected</option>
            </select>
        </div>

    </div>

    <div class="row mt-3">

        <div class="col-md-3">
            <label>From Date</label>
            <input type="date" id="from_date" class="form-control">
        </div>

        <div class="col-md-3">
            <label>To Date</label>
            <input type="date" id="to_date" class="form-control">
        </div>

        <div class="col-md-6">
            <label>Reason</label>
            <input type="text" id="reason" class="form-control">
        </div>

    </div>

    <div class="mt-3">

        <button class="btn btn-success" onclick="saveLeave()">
            Save
        </button>

        <button class="btn btn-warning" onclick="updateLeave()">
            Update
        </button>

    </div>

    <hr>

    <div class="row">

        <div class="col-md-6">

            <select id="filterStatus" class="form-control"
                onchange="loadLeaves()">

                <option value="">All Status</option>
                <option>Pending</option>
                <option>Approved</option>
                <option>Rejected</option>

            </select>

        </div>

        <div class="col-md-6">

            <select id="filterType" class="form-control"
                onchange="loadLeaves()">

                <option value="">All Types</option>
                <option>Casual</option>
                <option>Sick</option>
                <option>Earned</option>

            </select>

        </div>

    </div>

    <br>

    <table class="table table-bordered">

        <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Employee</th>
            <th>Type</th>
            <th>From</th>
            <th>To</th>
            <th>Reason</th>
            <th>Status</th>
            <th>Action</th>

        </tr>

        </thead>

        <tbody id="leaveTable"></tbody>

    </table>

</div>

<script src="/static/js/leave.js"></script>

{% endblock %}
