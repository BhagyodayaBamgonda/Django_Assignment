{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2 class="text-center mb-4">Employee Management</h2>

    <div class="card p-3">

        {% csrf_token %}

        <input type="hidden" id="id">

        <div class="row">

            <div class="col-md-4">
                <label>Employee ID</label>
                <input type="text" id="employee_id" class="form-control">
            </div>

            <div class="col-md-4">
                <label>Name</label>
                <input type="text" id="name" class="form-control">
            </div>

            <div class="col-md-4">
                <label>Email</label>
                <input type="email" id="email" class="form-control">
            </div>

        </div>

        <div class="row mt-3">

            <div class="col-md-4">
                <label>Username</label>
                <input type="text" id="username" class="form-control">
            </div>

            <div class="col-md-4">
                <label>Password</label>
                <input type="password" id="password" class="form-control">
            </div>

        </div>

        <div class="row mt-3">

            <div class="col-md-4">
                <label>Department</label>
                <input type="text" id="department" class="form-control">
            </div>

            <div class="col-md-4">
                <label>Mobile Number</label>
                <input type="text" id="mobile_number" class="form-control">
            </div>

            <div class="col-md-4">
                <label>Date of Joining</label>
                <input type="date" id="date_of_joining" class="form-control">
            </div>

        </div>

        <div class="mt-3">

            <button class="btn btn-success" onclick="saveEmployee()">Save</button>

            <button class="btn btn-warning" onclick="updateEmployee()">Update</button>

        </div>

    </div>

    <br>

    <input type="text"
           id="search"
           class="form-control"
           placeholder="Search Employee"
           onkeyup="loadEmployees()">

    <br>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

            <tr>

                <th>ID</th>
                <th>Employee ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Mobile</th>
                <th>Date</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody id="employeeTable">

        </tbody>

    </table>

</div>

<script src="/static/js/employee.js?v=20260713-csrf-everywhere"></script>

{% endblock %}
